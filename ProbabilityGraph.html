<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>攻击概率可视化 | Attack Probability Graph</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
      color: #333;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      animation: slideIn 0.6s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      text-align: center;
      color: #2d3748;
      margin-bottom: 10px;
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: #718096;
      margin-bottom: 40px;
      font-size: 1.1rem;
    }

    .main-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 40px;
      align-items: start;
    }

    .controls-panel {
      background: #f7fafc;
      padding: 30px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      position: sticky;
      top: 20px;
    }

    .control-group {
      margin-bottom: 25px;
      position: relative;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-weight: 600;
      color: #2d3748;
      font-size: 0.95rem;
    }

    .stat-badge {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 700;
      min-width: 40px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
      transition: transform 0.2s;
    }

    .stat-badge:hover {
      transform: scale(1.1);
    }

    input[type=range] {
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: #e2e8f0;
      outline: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.5);
    }

    input[type=range]::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
    }

    .range-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 5px;
      font-size: 0.75rem;
      color: #a0aec0;
    }

    .chart-container {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      position: relative;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #f0f0f0;
    }

    .chart-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #2d3748;
    }

    .legend {
      display: flex;
      gap: 20px;
      font-size: 0.85rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-color {
      width: 20px;
      height: 3px;
      border-radius: 2px;
    }

    .legend-color.line {
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
    }

    .legend-color.point {
      background: #e53e3e;
      height: 12px;
      width: 12px;
      border-radius: 50%;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }

    .info-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 30px;
    }

    .info-card {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .info-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .info-card.highlight {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .info-label {
      font-size: 0.85rem;
      opacity: 0.9;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .info-value {
      font-size: 1.8rem;
      font-weight: 700;
    }

    .formula-box {
      background: #edf2f7;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin-top: 20px;
      border-radius: 0 8px 8px 0;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      color: #4a5568;
    }

    @media (max-width: 968px) {
      .main-layout {
        grid-template-columns: 1fr;
      }
      .controls-panel {
        position: static;
      }
      .info-cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚔️ 攻击概率可视化</h1>
    <p class="subtitle">Attack Probability Calculator & Visualizer</p>
    
    <div class="main-layout">
      <div class="controls-panel">
        <div class="control-group">
          <div class="control-label">
            <span>🛡️ 角色力量 (R)</span>
            <span class="stat-badge" id="rVal">3</span>
          </div>
          <input type="range" id="R" min="1" max="10" value="3" step="1" oninput="update()">
          <div class="range-labels">
            <span>1</span>
            <span>10</span>
          </div>
        </div>

        <div class="control-group">
          <div class="control-label">
            <span>⚔️ 武器力量 (W)</span>
            <span class="stat-badge" id="wVal">0</span>
          </div>
          <input type="range" id="W" min="0" max="10" value="0" step="1" oninput="update()">
          <div class="range-labels">
            <span>0</span>
            <span>10</span>
          </div>
        </div>

        <div class="control-group">
          <div class="control-label">
            <span>💪 当前坚韧度 (T)</span>
            <span class="stat-badge" id="tVal">5</span>
          </div>
          <input type="range" id="T" min="1" max="10" value="5" step="1" oninput="update()">
          <div class="range-labels">
            <span>1</span>
            <span>10</span>
          </div>
        </div>

        <div class="formula-box">
          <strong>计算公式:</strong><br>
          T' = max(T - W, 0)<br>
          P = R / (R + T') × 100%
        </div>
      </div>

      <div class="chart-wrapper">
        <div class="chart-container">
          <div class="chart-header">
            <div class="chart-title">概率曲线图</div>
            <div class="legend">
              <div class="legend-item">
                <div class="legend-color line"></div>
                <span>概率曲线</span>
              </div>
              <div class="legend-item">
                <div class="legend-color point"></div>
                <span>当前位置</span>
              </div>
            </div>
          </div>
          <canvas id="chart" width="800" height="450"></canvas>
        </div>

        <div class="info-cards">
          <div class="info-card">
            <div class="info-label">有效坚韧度</div>
            <div class="info-value" id="effectiveT">5</div>
          </div>
          <div class="info-card highlight">
            <div class="info-label">当前攻击成功率</div>
            <div class="info-value" id="currentProb">37.5%</div>
          </div>
          <div class="info-card">
            <div class="info-label">最大可能概率</div>
            <div class="info-value" id="maxProb">100%</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");
    
    // 高DPI支持
    function setupCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
      return rect;
    }

    function getProb(R, W, T) {
      let Tp = Math.max(T - W, 0);
      if (Tp === 0) return 100;
      return (R / (R + Tp)) * 100;
    }

    function update() {
      const R = parseInt(document.getElementById("R").value);
      const W = parseInt(document.getElementById("W").value);
      const T = parseInt(document.getElementById("T").value);
      
      // 更新显示值
      document.getElementById("rVal").textContent = R;
      document.getElementById("wVal").textContent = W;
      document.getElementById("tVal").textContent = T;
      
      // 计算当前值
      const curProb = getProb(R, W, T);
      const effectiveT = Math.max(T - W, 0);
      
      // 更新信息卡片
      document.getElementById("effectiveT").textContent = effectiveT;
      document.getElementById("currentProb").textContent = curProb.toFixed(1) + '%';
      document.getElementById("maxProb").textContent = W >= 10 ? '100%' : 
        ((R / (R + Math.max(1 - W, 0))) * 100).toFixed(1) + '%';

      // 设置画布
      const rect = setupCanvas();
      const width = rect.width;
      const height = rect.height;
      const padding = { top: 40, right: 40, bottom: 60, left: 60 };
      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;

      // 清除画布
      ctx.clearRect(0, 0, width, height);

      // 绘制网格
      ctx.strokeStyle = "#e2e8f0";
      ctx.lineWidth = 1;
      
      // 垂直网格线
      for (let i = 0; i <= 10; i++) {
        const x = padding.left + (i * chartWidth / 9);
        ctx.beginPath();
        ctx.moveTo(x, padding.top);
        ctx.lineTo(x, padding.top + chartHeight);
        ctx.stroke();
      }
      
      // 水平网格线
      for (let i = 0; i <= 5; i++) {
        const y = padding.top + (i * chartHeight / 5);
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(padding.left + chartWidth, y);
        ctx.stroke();
      }

      // 坐标轴
      ctx.strokeStyle = "#2d3748";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(padding.left, padding.top);
      ctx.lineTo(padding.left, padding.top + chartHeight);
      ctx.lineTo(padding.left + chartWidth, padding.top + chartHeight);
      ctx.stroke();

      // 刻度标签
      ctx.fillStyle = "#4a5568";
      ctx.font = "12px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      
      // X轴标签
      for (let t = 1; t <= 10; t++) {
        const x = padding.left + ((t - 1) * chartWidth / 9);
        ctx.fillText("T=" + t, x, padding.top + chartHeight + 10);
      }
      
      // Y轴标签
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      for (let p = 0; p <= 100; p += 20) {
        const y = padding.top + chartHeight - (p * chartHeight / 100);
        ctx.fillText(p + "%", padding.left - 10, y);
      }

      // 轴标题
      ctx.save();
      ctx.translate(20, padding.top + chartHeight / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.textAlign = "center";
      ctx.font = "bold 14px sans-serif";
      ctx.fillStyle = "#2d3748";
      ctx.fillText("Success Probability", 0, 0);
      ctx.restore();
      
      ctx.textAlign = "center";
      ctx.font = "bold 14px sans-serif";
      ctx.fillText("Tenacity (T)", padding.left + chartWidth / 2, height - 15);

      // 计算曲线点
      const points = [];
      for (let t = 1; t <= 10; t++) {
        const prob = getProb(R, W, t);
        const x = padding.left + ((t - 1) * chartWidth / 9);
        const y = padding.top + chartHeight - (prob * chartHeight / 100);
        points.push({ x, y, prob, t });
      }

      // 绘制渐变区域
      const gradient = ctx.createLinearGradient(0, padding.top, 0, padding.top + chartHeight);
      gradient.addColorStop(0, "rgba(102, 126, 234, 0.3)");
      gradient.addColorStop(1, "rgba(118, 75, 162, 0.05)");
      
      ctx.beginPath();
      ctx.moveTo(points[0].x, padding.top + chartHeight);
      points.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.lineTo(points[points.length - 1].x, padding.top + chartHeight);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();

      // 绘制曲线
      ctx.beginPath();
      ctx.strokeStyle = "#667eea";
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      
      // 使用贝塞尔曲线使线条更平滑
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) {
        const xc = (points[i].x + points[i-1].x) / 2;
        const yc = (points[i].y + points[i-1].y) / 2;
        ctx.quadraticCurveTo(points[i-1].x, points[i-1].y, xc, yc);
      }
      ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
      ctx.stroke();

      // 绘制数据点
      points.forEach((p, index) => {
        ctx.beginPath();
        ctx.fillStyle = "white";
        ctx.strokeStyle = "#667eea";
        ctx.lineWidth = 2;
        ctx.arc(p.x, p.y, 4, 0, 2 * Math.PI);
        ctx.fill();
        ctx.stroke();
      });

      // 当前 T 点标记
      const curPoint = points[T - 1];
      
      // 脉冲动画效果
      const time = Date.now() / 1000;
      const pulseRadius = 6 + Math.sin(time * 3) * 2;
      
      // 外圈光晕
      ctx.beginPath();
      ctx.fillStyle = "rgba(229, 62, 62, 0.2)";
      ctx.arc(curPoint.x, curPoint.y, pulseRadius + 4, 0, 2 * Math.PI);
      ctx.fill();
      
      // 内圈实心
      ctx.beginPath();
      ctx.fillStyle = "#e53e3e";
      ctx.arc(curPoint.x, curPoint.y, 6, 0, 2 * Math.PI);
      ctx.fill();
      ctx.strokeStyle = "white";
      ctx.lineWidth = 2;
      ctx.stroke();

      // 当前值标签
      ctx.fillStyle = "#e53e3e";
      ctx.font = "bold 14px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      
      // 标签背景
      const text = `${curProb.toFixed(1)}%`;
      const textWidth = ctx.measureText(text).width;
      ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
      ctx.fillRect(curPoint.x - textWidth/2 - 8, curPoint.y - 35, textWidth + 16, 24);
      ctx.strokeStyle = "#e53e3e";
      ctx.lineWidth = 1;
      ctx.strokeRect(curPoint.x - textWidth/2 - 8, curPoint.y - 35, textWidth + 16, 24);
      
      ctx.fillStyle = "#e53e3e";
      ctx.fillText(text, curPoint.x, curPoint.y - 18);
      
      // 连接线
      ctx.beginPath();
      ctx.strokeStyle = "#e53e3e";
      ctx.setLineDash([5, 5]);
      ctx.lineWidth = 1;
      ctx.moveTo(curPoint.x, curPoint.y);
      ctx.lineTo(curPoint.x, padding.top + chartHeight);
      ctx.stroke();
      ctx.setLineDash([]);

      requestAnimationFrame(update);
    }

    // 初始绘制
    update();
    
    // 响应式处理
    window.addEventListener('resize', update);
  </script>
</body>
</html>
