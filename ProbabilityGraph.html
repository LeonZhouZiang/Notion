<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>攻击概率可视化 | Attack Probability Graph</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
    }

    @media (max-width: 768px) {
      html {
        font-size: 14px;
      }
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: clamp(10px, 3vw, 40px);
      color: #333;
      overflow-x: hidden;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: clamp(12px, 3vw, 24px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: clamp(20px, 4vw, 40px);
      animation: slideIn 0.6s ease-out;
      width: 100%;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      text-align: center;
      color: #2d3748;
      margin-bottom: 0.5rem;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }

    .subtitle {
      text-align: center;
      color: #718096;
      margin-bottom: clamp(20px, 4vw, 40px);
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    }

    .main-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: clamp(20px, 3vw, 40px);
      align-items: start;
    }

    @media (max-width: 900px) {
      .main-layout {
        grid-template-columns: 1fr;
      }
    }

    .controls-panel {
      background: #f7fafc;
      padding: clamp(20px, 3vw, 30px);
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      position: sticky;
      top: 20px;
      height: fit-content;
    }

    @media (max-width: 900px) {
      .controls-panel {
        position: static;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
      }
      
      .formula-box {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 600px) {
      .controls-panel {
        grid-template-columns: 1fr;
      }
    }

    .control-group {
      margin-bottom: 25px;
      position: relative;
    }

    @media (max-width: 900px) {
      .control-group {
        margin-bottom: 0;
      }
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-weight: 600;
      color: #2d3748;
      font-size: clamp(0.85rem, 2vw, 0.95rem);
      flex-wrap: wrap;
      gap: 5px;
    }

    .stat-badge {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 700;
      min-width: 40px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .stat-badge:hover {
      transform: scale(1.1);
    }

    input[type=range] {
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: #e2e8f0;
      outline: none;
      -webkit-appearance: none;
      cursor: pointer;
      touch-action: manipulation;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.5);
    }

    input[type=range]::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
    }

    .range-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 5px;
      font-size: 0.75rem;
      color: #a0aec0;
    }

    .chart-wrapper {
      min-width: 0; /* 防止grid溢出 */
    }

    .chart-container {
      background: white;
      border-radius: 16px;
      padding: clamp(15px, 3vw, 25px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      position: relative;
      width: 100%;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 2px solid #f0f0f0;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chart-title {
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-weight: 600;
      color: #2d3748;
    }

    .legend {
      display: flex;
      gap: clamp(10px, 2vw, 20px);
      font-size: clamp(0.75rem, 2vw, 0.85rem);
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .legend-color {
      width: 20px;
      height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .legend-color.line {
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
    }

    .legend-color.point {
      background: #e53e3e;
      height: 12px;
      width: 12px;
      border-radius: 50%;
    }

    .canvas-wrapper {
      position: relative;
      width: 100%;
      height: 0;
      padding-bottom: 56.25%; /* 16:9 比例 */
      min-height: 300px;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 8px;
    }

    .info-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: clamp(10px, 2vw, 15px);
      margin-top: clamp(20px, 3vw, 30px);
    }

    .info-card {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      padding: clamp(15px, 3vw, 20px);
      border-radius: 12px;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
      min-width: 0;
    }

    .info-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .info-card.highlight {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .info-label {
      font-size: clamp(0.7rem, 1.8vw, 0.85rem);
      opacity: 0.9;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
      word-wrap: break-word;
    }

    .info-value {
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      font-weight: 700;
      word-wrap: break-word;
    }

    .formula-box {
      background: #edf2f7;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin-top: 20px;
      border-radius: 0 8px 8px 0;
      font-family: 'Courier New', monospace;
      font-size: clamp(0.8rem, 2vw, 0.9rem);
      color: #4a5568;
      overflow-x: auto;
    }

    @media (max-width: 480px) {
      .chart-header {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .legend {
        width: 100%;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚔️ 攻击概率可视化</h1>
    <p class="subtitle">Attack Probability Calculator & Visualizer</p>
    
    <div class="main-layout">
      <div class="controls-panel">
        <div class="control-group">
          <div class="control-label">
            <span>🛡️ 角色力量 (R)</span>
            <span class="stat-badge" id="rVal">3</span>
          </div>
          <input type="range" id="R" min="1" max="10" value="3" step="1" oninput="update()">
          <div class="range-labels">
            <span>1</span>
            <span>10</span>
          </div>
        </div>

        <div class="control-group">
          <div class="control-label">
            <span>⚔️ 武器力量 (W)</span>
            <span class="stat-badge" id="wVal">0</span>
          </div>
          <input type="range" id="W" min="0" max="10" value="0" step="1" oninput="update()">
          <div class="range-labels">
            <span>0</span>
            <span>10</span>
          </div>
        </div>

        <div class="control-group">
          <div class="control-label">
            <span>💪 当前坚韧度 (T)</span>
            <span class="stat-badge" id="tVal">5</span>
          </div>
          <input type="range" id="T" min="1" max="10" value="5" step="1" oninput="update()">
          <div class="range-labels">
            <span>1</span>
            <span>10</span>
          </div>
        </div>

        <div class="formula-box">
          <strong>计算公式:</strong><br>
          T' = max(T - W, 0)<br>
          P = R / (R + T') × 100%
        </div>
      </div>

      <div class="chart-wrapper">
        <div class="chart-container">
          <div class="chart-header">
            <div class="chart-title">概率曲线图</div>
            <div class="legend">
              <div class="legend-item">
                <div class="legend-color line"></div>
                <span>概率曲线</span>
              </div>
              <div class="legend-item">
                <div class="legend-color point"></div>
                <span>当前位置</span>
              </div>
            </div>
          </div>
          <div class="canvas-wrapper">
            <canvas id="chart"></canvas>
          </div>
        </div>

        <div class="info-cards">
          <div class="info-card">
            <div class="info-label">有效坚韧度</div>
            <div class="info-value" id="effectiveT">5</div>
          </div>
          <div class="info-card highlight">
            <div class="info-label">当前攻击成功率</div>
            <div class="info-value" id="currentProb">37.5%</div>
          </div>
          <div class="info-card">
            <div class="info-label">最大可能概率</div>
            <div class="info-value" id="maxProb">100%</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");
    let animationId = null;
    let isAnimating = true;
    
    // 获取canvas实际显示尺寸
    function getCanvasDisplaySize() {
      const wrapper = canvas.parentElement;
      const rect = wrapper.getBoundingClientRect();
      return {
        width: rect.width,
        height: rect.height
      };
    }

    // 设置高DPI画布
    function setupCanvas() {
      const size = getCanvasDisplaySize();
      const dpr = window.devicePixelRatio || 1;
      
      // 设置实际画布尺寸（考虑DPI）
      canvas.width = size.width * dpr;
      canvas.height = size.height * dpr;
      
      // 设置显示尺寸
      canvas.style.width = size.width + 'px';
      canvas.style.height = size.height + 'px';
      
      // 缩放上下文以匹配DPI
      ctx.scale(dpr, dpr);
      
      return size;
    }

    function getProb(R, W, T) {
      let Tp = Math.max(T - W, 0);
      if (Tp === 0) return 100;
      return (R / (R + Tp)) * 100;
    }

    function update() {
      const R = parseInt(document.getElementById("R").value);
      const W = parseInt(document.getElementById("W").value);
      const T = parseInt(document.getElementById("T").value);
      
      // 更新显示值
      document.getElementById("rVal").textContent = R;
      document.getElementById("wVal").textContent = W;
      document.getElementById("tVal").textContent = T;
      
      // 计算当前值
      const curProb = getProb(R, W, T);
      const effectiveT = Math.max(T - W, 0);
      
      // 更新信息卡片
      document.getElementById("effectiveT").textContent = effectiveT;
      document.getElementById("currentProb").textContent = curProb.toFixed(1) + '%';
      document.getElementById("maxProb").textContent = W >= 10 ? '100%' : 
        ((R / (R + Math.max(1 - W, 0))) * 100).toFixed(1) + '%';

      // 设置画布
      const size = setupCanvas();
      const width = size.width;
      const height = size.height;
      
      // 响应式边距
      const padding = {
        top: height * 0.08,
        right: width * 0.08,
        bottom: height * 0.15,
        left: width * 0.12
      };
      
      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;

      // 清除画布
      ctx.clearRect(0, 0, width, height);

      // 绘制网格
      ctx.strokeStyle = "#e2e8f0";
      ctx.lineWidth = 1;
      
      // 垂直网格线
      for (let i = 0; i <= 9; i++) {
        const x = padding.left + (i * chartWidth / 9);
        ctx.beginPath();
        ctx.moveTo(x, padding.top);
        ctx.lineTo(x, padding.top + chartHeight);
        ctx.stroke();
      }
      
      // 水平网格线
      for (let i = 0; i <= 5; i++) {
        const y = padding.top + (i * chartHeight / 5);
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(padding.left + chartWidth, y);
        ctx.stroke();
      }

      // 坐标轴
      ctx.strokeStyle = "#2d3748";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(padding.left, padding.top);
      ctx.lineTo(padding.left, padding.top + chartHeight);
      ctx.lineTo(padding.left + chartWidth, padding.top + chartHeight);
      ctx.stroke();

      // 刻度标签
      ctx.fillStyle = "#4a5568";
      ctx.font = `${Math.max(10, height * 0.025)}px sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      
      // X轴标签
      for (let t = 1; t <= 10; t++) {
        const x = padding.left + ((t - 1) * chartWidth / 9);
        ctx.fillText("T=" + t, x, padding.top + chartHeight + height * 0.02);
      }
      
      // Y轴标签
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      for (let p = 0; p <= 100; p += 20) {
        const y = padding.top + chartHeight - (p * chartHeight / 100);
        ctx.fillText(p + "%", padding.left - width * 0.02, y);
      }

      // 轴标题
      const fontSize = Math.max(12, height * 0.035);
      ctx.save();
      ctx.translate(fontSize, padding.top + chartHeight / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.textAlign = "center";
      ctx.font = `bold ${fontSize}px sans-serif`;
      ctx.fillStyle = "#2d3748";
      ctx.fillText("Success Probability", 0, 0);
      ctx.restore();
      
      ctx.textAlign = "center";
      ctx.font = `bold ${fontSize}px sans-serif`;
      ctx.fillText("Tenacity (T)", padding.left + chartWidth / 2, height - fontSize);

      // 计算曲线点
      const points = [];
      for (let t = 1; t <= 10; t++) {
        const prob = getProb(R, W, t);
        const x = padding.left + ((t - 1) * chartWidth / 9);
        const y = padding.top + chartHeight - (prob * chartHeight / 100);
        points.push({ x, y, prob, t });
      }

      // 绘制渐变区域
      const gradient = ctx.createLinearGradient(0, padding.top, 0, padding.top + chartHeight);
      gradient.addColorStop(0, "rgba(102, 126, 234, 0.3)");
      gradient.addColorStop(1, "rgba(118, 75, 162, 0.05)");
      
      ctx.beginPath();
      ctx.moveTo(points[0].x, padding.top + chartHeight);
      points.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.lineTo(points[points.length - 1].x, padding.top + chartHeight);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();

      // 绘制曲线
      ctx.beginPath();
      ctx.strokeStyle = "#667eea";
      ctx.lineWidth = Math.max(2, height * 0.006);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      
      // 使用贝塞尔曲线使线条更平滑
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) {
        const xc = (points[i].x + points[i-1].x) / 2;
        const yc = (points[i].y + points[i-1].y) / 2;
        ctx.quadraticCurveTo(points[i-1].x, points[i-1].y, xc, yc);
      }
      ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
      ctx.stroke();

      // 绘制数据点
      const pointRadius = Math.max(3, height * 0.008);
      points.forEach((p, index) => {
        ctx.beginPath();
        ctx.fillStyle = "white";
        ctx.strokeStyle = "#667eea";
        ctx.lineWidth = 2;
        ctx.arc(p.x, p.y, pointRadius, 0, 2 * Math.PI);
        ctx.fill();
        ctx.stroke();
      });

      // 当前 T 点标记
      const curPoint = points[T - 1];
      
      // 脉冲动画效果
      const time = Date.now() / 1000;
      const pulseRadius = pointRadius + 2 + Math.sin(time * 3) * 2;
      
      // 外圈光晕
      ctx.beginPath();
      ctx.fillStyle = "rgba(229, 62, 62, 0.2)";
      ctx.arc(curPoint.x, curPoint.y, pulseRadius + 4, 0, 2 * Math.PI);
      ctx.fill();
      
      // 内圈实心
      ctx.beginPath();
      ctx.fillStyle = "#e53e3e";
      ctx.arc(curPoint.x, curPoint.y, pointRadius + 2, 0, 2 * Math.PI);
      ctx.fill();
      ctx.strokeStyle = "white";
      ctx.lineWidth = 2;
      ctx.stroke();

      // 当前值标签
      const labelFontSize = Math.max(11, height * 0.028);
      ctx.font = `bold ${labelFontSize}px sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      
      // 标签背景
      const text = `${curProb.toFixed(1)}%`;
      const textWidth = ctx.measureText(text).width;
      const labelPadding = width * 0.015;
      const labelY = curPoint.y - height * 0.025;
      
      ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
      ctx.fillRect(curPoint.x - textWidth/2 - labelPadding, labelY - labelFontSize - labelPadding, 
                   textWidth + labelPadding*2, labelFontSize + labelPadding*2);
      ctx.strokeStyle = "#e53e3e";
      ctx.lineWidth = 1;
      ctx.strokeRect(curPoint.x - textWidth/2 - labelPadding, labelY - labelFontSize - labelPadding, 
                     textWidth + labelPadding*2, labelFontSize + labelPadding*2);
      
      ctx.fillStyle = "#e53e3e";
      ctx.fillText(text, curPoint.x, labelY);
      
      // 连接线
      ctx.beginPath();
      ctx.strokeStyle = "#e53e3e";
      ctx.setLineDash([5, 5]);
      ctx.lineWidth = 1;
      ctx.moveTo(curPoint.x, curPoint.y);
      ctx.lineTo(curPoint.x, padding.top + chartHeight);
      ctx.stroke();
      ctx.setLineDash([]);

      if (isAnimating) {
        animationId = requestAnimationFrame(update);
      }
    }

    // 使用 ResizeObserver 监听容器大小变化
    const resizeObserver = new ResizeObserver(entries => {
      // 防抖处理
      if (animationId) {
        cancelAnimationFrame(animationId);
      }
      update();
    });

    resizeObserver.observe(canvas.parentElement);

    // 初始绘制
    update();

    // 页面可见性变化时暂停/恢复动画
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        isAnimating = false;
        if (animationId) cancelAnimationFrame(animationId);
      } else {
        isAnimating = true;
        update();
      }
    });

    // 清理
    window.addEventListener('beforeunload', () => {
      resizeObserver.disconnect();
      if (animationId) cancelAnimationFrame(animationId);
    });
  </script>
</body>
</html>
