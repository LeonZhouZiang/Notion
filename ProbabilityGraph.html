<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>攻击概率可视化 | Attack Probability Graph</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
      color: #333;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      animation: slideIn 0.6s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      text-align: center;
      color: #2d3748;
      margin-bottom: 10px;
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: #718096;
      margin-bottom: 40px;
      font-size: 1.1rem;
    }

    .main-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 40px;
      align-items: start;
    }

    .controls-panel {
      background: #f7fafc;
      padding: 30px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      position: sticky;
      top: 20px;
    }

    .control-group {
      margin-bottom: 25px;
      position: relative;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-weight: 600;
      color: #2d3748;
      font-size: 0.95rem;
    }

    .stat-badge {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 700;
      min-width: 40px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
      transition: transform 0.2s;
    }

    .stat-badge:hover {
      transform: scale(1.1);
    }

    input[type=range] {
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: #e2e8f0;
      outline: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.5);
    }

    input[type=range]::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
    }

    .range-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 5px;
      font-size: 0.75rem;
      color: #a0aec0;
    }

    .chart-container {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      position: relative;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #f0f0f0;
    }

    .chart-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #2d3748;
    }

    .legend {
      display: flex;
      gap: 20px;
      font-size: 0.85rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-color {
      width: 20px;
      height: 3px;
      border-radius: 2px;
    }

    .legend-color.line {
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
    }

    .legend-color.point {
      background: #e53e3e;
      height: 12px;
      width: 12px;
      border-radius: 50%;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }

    .info-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 30px;
    }

    .info-card {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .info-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .info-card.highlight {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .info-label {
      font-size: 0.85rem;
      opacity: 0.9;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .info-value {
      font-size: 1.8rem;
      font-weight: 700;
    }

    .formula-box {
      background: #edf2f7;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin-top: 20px;
      border-radius: 0 8px 8px 0;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      color: #4a5568;
    }

    @media (max-width: 968px) {
      .main-layout {
        grid-template-columns: 1fr;
      }
      .controls-panel {
        position: static;
      }
      .info-cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚔️ 攻击概率可视化</h1>
    <p class="subtitle">Attack Probability Calculator & Visualizer</p>
    
    <div class="main-layout">
      <div class="controls-panel">
        <div class="control-group">
          <div class="control-label">
            <span>🛡️ 角色力量 (R)</span>
            <span class="stat-badge" id="rVal">3</span>
          </div>
          <input type="range" id="R" min="1" max="10" value="3" step="1" oninput="update()">
          <div class="range-labels">
            <span>1</span>
            <span>10</span>
          </div>
        </div>

        <div class="control-group">
          <div class="control-label">
            <span>⚔️ 武器力量 (W)</span>
            <span class="stat-badge" id="wVal">0</span>
          </div>
          <input type="range" id="W" min="0" max="10" value="0" step="1" oninput="update()">
          <div class="range-labels">
            <span>0</span>
            <span>10</span>
          </div>
        </div>

        <div class="control-group">
          <div class="control-label">
            <span>💪 当前坚韧度 (T)</span>
            <span class="stat-badge" id="tVal">5</span>
          </div>
          <input type="range" id="T" min="1" max="10" value="5" step="1" oninput="update()">
          <div class="range-labels">
            <span>1</span>
            <span>10</span>
          </div>
        </div>

        <div class="formula-box">
          <strong>计算公式:</strong><br>
          T' = max(T - W, 0)<br>
          P = R / (R + T') × 100%
        </div>
      </div>
